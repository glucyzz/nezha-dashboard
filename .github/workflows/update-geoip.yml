name: Release-update-geoip.db

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    - cron: "0 3 */7 * *"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FIXED_TAG: v0.20.13

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    container:
      image: goreleaser/goreleaser-cross:v1.23

    steps:
      - name: Git safe directory
        run: git config --global --add safe.directory /__w/nezha-dashboard/nezha-dashboard

      - name: Checkout fixed tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.FIXED_TAG }}

      - name: Fetch IPInfo GeoIP Database
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          rm -f pkg/geoip/geoip.db
          wget -qO pkg/geoip/geoip.db \
            "https://ipinfo.io/data/free/country.mmdb?token=${IPINFO_TOKEN}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Build
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --single-target --clean --skip=validate

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ./dist/*/*

  release:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write

    env:
      FIXED_TAG: v0.20.13

    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets

      - name: Package artifacts with original naming
        run: |
          set -e
          mkdir -p release

          for dir in assets/dashboard-*; do
            name=$(basename "$dir")
            bin=$(find "$dir" -type f | head -n 1)

            if [ -z "$bin" ]; then
              echo "No binary found in $dir"
              exit 1
            fi

            zip -j "release/${name}.zip" "$bin"
          done

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.FIXED_TAG }}
          name: ${{ env.FIXED_TAG }}
          artifacts: "release/*.zip"
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
